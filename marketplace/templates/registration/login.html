{% extends 'marketplace/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign in | ProxiFix{% endblock %}

{% block content %}
<section class="container section-space">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="auth-card">
                <span class="eyebrow">Welcome back</span>
                <h1>Sign in to ProxiFix</h1>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button class="btn btn-brand mt-3" type="submit">Sign in</button>
                </form>
                <p class="mt-4 mb-0">Don't have an account? <a href="{% url 'register' %}">Get started</a>.</p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
